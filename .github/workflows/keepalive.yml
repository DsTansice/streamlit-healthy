name: Streamlit Keep Alive

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  STREAMLIT_URL: ${{ secrets.STREAMLIT_URL }}

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright (local)
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium
          npx playwright install-deps chromium

      - name: Wake Streamlit App
        id: wake_app
        run: |
          cat > wake.js << 'SCRIPT'
          const { chromium } = require('playwright');

          (async () => {
            const url = process.env.STREAMLIT_URL;
            if (!url) {
              console.error('❌ STREAMLIT_URL not set');
              process.exit(1);
            }

            console.log(`🌐 Accessing: ${url}`);

            const browser = await chromium.launch({ 
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });

            const context = await browser.newContext({
              viewport: { width: 1280, height: 720 }
            });

            const page = await context.newPage();

            try {
              await page.goto(url, { 
                waitUntil: 'domcontentloaded', 
                timeout: 120000 
              });

              console.log('⏳ Waiting for page to stabilize...');
              await page.waitForTimeout(8000);

              // 获取页面标题和可见文本，用于诊断
              const title = await page.title();
              console.log(`📄 Page title: ${title}`);

              const pageText = await page.locator('body').innerText({ timeout: 5000 }).catch(() => 'N/A');
              console.log(`📝 Page text snippet: ${pageText.substring(0, 200)}`);

              // 截图用于调试
              await page.screenshot({ path: 'page_state.png', fullPage: true });
              console.log('📸 Screenshot saved');

              // 方法1: 用 XPath 查找唤醒按钮（参考 Selenium 方案）
              const wakeButtonXPath = page.locator('xpath=//button[contains(text(),"Yes, get this app back up")]');
              const wakeButtonCount1 = await wakeButtonXPath.count();

              // 方法2: 用 role + name 查找
              const wakeButtonRole = page.getByRole('button', { name: /Yes, get this app back up/i });
              const wakeButtonCount2 = await wakeButtonRole.count();

              // 方法3: 用通用文本查找
              const wakeButtonText = page.locator('text=Yes, get this app back up');
              const wakeButtonCount3 = await wakeButtonText.count();

              console.log(`🔍 Wake button found: XPath=${wakeButtonCount1}, Role=${wakeButtonCount2}, Text=${wakeButtonCount3}`);

              let wakeButton = null;
              if (wakeButtonCount1 > 0) wakeButton = wakeButtonXPath;
              else if (wakeButtonCount2 > 0) wakeButton = wakeButtonRole;
              else if (wakeButtonCount3 > 0) wakeButton = wakeButtonText;

              if (wakeButton) {
                console.log('😴 App is sleeping. Clicking wake button...');
                await wakeButton.click();

                console.log('⏳ Waiting for app to wake up (60s)...');
                await page.waitForTimeout(60000);

                // 再次截图看状态
                await page.screenshot({ path: 'after_wake.png', fullPage: true });

                // 检查页面是否已变为正常 Streamlit 页面
                const newTitle = await page.title();
                const hasStreamlit = await page.locator('body').innerText().then(t => t.includes('streamlit') || t.includes('Streamlit')).catch(() => false);

                if (newTitle !== title || hasStreamlit) {
                  console.log('✅ App appears to be waking up!');
                } else {
                  console.log('⚠️ Wake button clicked, checking final state...');
                }
              } else {
                // 检查是否是正常运行的 Streamlit 页面
                const bodyText = await page.locator('body').innerText({ timeout: 5000 }).catch(() => '');
                const isStreamlitRunning = bodyText.includes('streamlit') || 
                                           bodyText.includes('Streamlit') ||
                                           bodyText.includes('Running') ||
                                           await page.locator('[data-testid="stAppViewContainer"]').count() > 0 ||
                                           await page.locator('.stApp').count() > 0 ||
                                           await page.locator('iframe').count() > 0;

                if (isStreamlitRunning) {
                  console.log('✅ App is already running');
                } else if (bodyText.includes('Please wait') || bodyText.includes('Loading')) {
                  console.log('⏳ App is loading...');
                } else {
                  console.log('⚠️ Unknown state - no wake button found');
                  console.log(`Body text: ${bodyText.substring(0, 300)}`);
                }
              }

            } catch (error) {
              console.error('❌ Error:', error.message);
              await page.screenshot({ path: 'error.png', fullPage: true });
              throw error;
            } finally {
              await browser.close();
            }
          })();
          SCRIPT

          node wake.js

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: '*.png'
          retention-days: 7

      
      - name: 保活提交（不修改 workflow）
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          # 创建/更新一个保活记录文件
          cat > .keepalive << EOF
          last_run: $(date -u +%Y-%m-%d_%H:%M:%S)_UTC
          next_cron: $(grep -oP "(?<=- cron: ')[^']+" .github/workflows/keepalive.yml)
          EOF
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .keepalive
          git commit -m "🚀 auto: 保活 $(date -u +%Y-%m-%d)" || echo "无变更"
          
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push
