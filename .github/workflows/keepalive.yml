name: Streamlit Keep Alive

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  STREAMLIT_URL: ${{ secrets.STREAMLIT_URL }}

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright (local)
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium
          npx playwright install-deps chromium

      - name: Wake Streamlit App
        id: wake_app
        run: |
          cat > wake.js << 'SCRIPT'
          const { chromium } = require('playwright');

          (async () => {
            const url = process.env.STREAMLIT_URL;
            if (!url) {
              console.error('❌ STREAMLIT_URL not set');
              process.exit(1);
            }

            console.log(`🌐 Accessing: ${url}`);

            const browser = await chromium.launch({ 
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });

            const context = await browser.newContext({
              viewport: { width: 1280, height: 720 }
            });

            const page = await context.newPage();

            try {
              await page.goto(url, { 
                waitUntil: 'domcontentloaded', 
                timeout: 120000 
              });

              console.log('⏳ Waiting for page to stabilize...');
              await page.waitForTimeout(5000);

              const wakeButton = page.locator('button:has-text("Yes, get this app back up!")');
              const wakeButtonCount = await wakeButton.count();

              if (wakeButtonCount > 0) {
                console.log('😴 App is sleeping. Clicking wake button...');
                await wakeButton.click();

                console.log('⏳ Waiting for app to wake up...');
                await page.waitForTimeout(30000);

                try {
                  await page.waitForSelector('[data-testid="stAppViewContainer"], .stApp, iframe', { 
                    timeout: 60000 
                  });
                  console.log('✅ App is now awake and running!');
                } catch {
                  console.log('⚠️ Wake button clicked, but app may still be loading');
                }
              } else {
                const appContainer = page.locator('[data-testid="stAppViewContainer"], .stApp');
                const isRunning = await appContainer.count() > 0;

                if (isRunning) {
                  console.log('✅ App is already running');
                } else {
                  console.log('⚠️ Unknown state - no wake button and no app container found');
                }
              }

              await page.waitForTimeout(5000);

            } catch (error) {
              console.error('❌ Error:', error.message);
              await page.screenshot({ path: 'error.png', fullPage: true });
              throw error;
            } finally {
              await browser.close();
            }
          })();
          SCRIPT

          node wake.js

      - name: Upload error screenshot (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot
          path: error.png
          retention-days: 7

      - name: 保活提交（不修改 workflow）
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          # 创建/更新一个保活记录文件
          cat > .keepalive << EOF
          last_run: $(date -u +%Y-%m-%d_%H:%M:%S)_UTC
          next_cron: $(grep -oP "(?<=- cron: ')[^']+" .github/workflows/keepalive.yml)
          EOF
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .keepalive
          git commit -m "🚀 auto: 保活 $(date -u +%Y-%m-%d)" || echo "无变更"
          
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push
